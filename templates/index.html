<!DOCTYPE html>
<html lang="ro">

<head>

    <meta charset="UTF-8">

    <title>5XO</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="layout">

    <!-- ========================= -->
    <!-- Panoul din stânga         -->
    <!-- ========================= -->

    <aside class="left-panel">

        <h1>5XO</h1>

        <h2>Five in a Row</h2>

        <hr>

        <p>
            <strong>Current Player:</strong>
            <span id="current-player">X</span>
        </p>

        <p>
            <strong>Status:</strong>
        </p>

        <p id="game-status">
            Game Started
        </p>

    </aside>


    <!-- ========================= -->
    <!-- Tabla de joc              -->
    <!-- ========================= -->

    <main>

        <section id="board-container">

            <!-- JavaScript va genera cele 2500 de celule -->

        </section>

    </main>


    <!-- ========================= -->
    <!-- Panoul din dreapta        -->
    <!-- ========================= -->

    <aside class="right-panel">

        <button id="reset-button">

            Restart Game

        </button>

    </aside>

</div>

<script src="{{ url_for('static', filename='js/game.js') }}"></script>

</body>

</html>
